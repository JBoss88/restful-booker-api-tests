name: Restful-Booker API Tests
on:
  push:
    branches: [main]
  workflow_dispatch:

# Keeping your Node.js warning fix from the UI project!
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Even for API tests, Playwright sometimes wants its underlying engine installed
      - name: Install Playwright engine
        env:
          # This tells Linux: "I am a robot, do not ask me Yes/No questions"
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install chromium --with-deps

      - name: Execute API Tests
        env:
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
        run: npm test

      - name: Save HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 14
